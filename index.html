<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTÈME DAVID</title>
    <style>
        body { background:#050505; color:#00ff99; font-family:monospace; text-align:center; padding:50px; }
        .btn { border:2px solid #00ff99; padding:20px; color:#00ff99; text-decoration:none; display:inline-block; margin-top:20px; cursor:pointer; }
    </style>
</head>
<body>
    <h1>CENTRAL DE NOTIFICATIONS</h1>
    <div id="status">SYSTÈME PRÊT</div>
    <div class="btn" onclick="activerSource()">ACTIVER LES SOLDATS (Bonjour/Bonsoir)</div>

    <script>
        function activerSource() {
            Notification.requestPermission().then(perm => {
                if (perm === "granted") {
                    document.getElementById('status').innerText = "SOLDATS ACTIVÉS";
                    new Notification("SYSTÈME DAVID", { body: "Bonjour ! Le soldat est en poste." });
                }
            });
        }
    </script>
</body>
</html>
